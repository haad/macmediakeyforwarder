name: Build and Release (Code Signed)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: latest-stable

    - name: Extract version from tag
      id: get_version
      run: |
        if [[ $GITHUB_REF == refs/tags/* ]]; then
          VERSION=${GITHUB_REF#refs/tags/}
          VERSION=${VERSION#v}
        else
          VERSION=$(git describe --tags --always 2>/dev/null || echo "dev")
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "Version: $VERSION"

    - name: Check for signing certificates
      id: check_secrets
      run: |
        if [ -n "${{ secrets.CERTIFICATES_P12 }}" ]; then
          echo "has_certs=true" >> $GITHUB_OUTPUT
        else
          echo "has_certs=false" >> $GITHUB_OUTPUT
        fi
        if [ -n "${{ secrets.NOTARIZATION_PASSWORD }}" ]; then
          echo "has_notarization=true" >> $GITHUB_OUTPUT
        else
          echo "has_notarization=false" >> $GITHUB_OUTPUT
        fi

    - name: Import Code Signing Certificates
      if: steps.check_secrets.outputs.has_certs == 'true'
      env:
        CERTIFICATES_P12: ${{ secrets.CERTIFICATES_P12 }}
        CERTIFICATES_PASSWORD: ${{ secrets.CERTIFICATES_PASSWORD }}
      run: |
        KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
        KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

        security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
        security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
        security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        echo "$CERTIFICATES_P12" | base64 --decode > certificate.p12
        security import certificate.p12 \
          -k "$KEYCHAIN_PATH" \
          -P "$CERTIFICATES_PASSWORD" \
          -T /usr/bin/codesign \
          -T /usr/bin/productsign

        security list-keychain -d user -s "$KEYCHAIN_PATH"
        security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

        rm certificate.p12

        IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed -E 's/.*"(.*)"/\1/')
        echo "SIGNING_IDENTITY=$IDENTITY" >> $GITHUB_ENV
        echo "Using identity: $IDENTITY"

    - name: Build and Archive (Signed)
      if: steps.check_secrets.outputs.has_certs == 'true'
      run: |
        xcodebuild \
          -project MacMediaKeyForwarder.xcodeproj \
          -scheme MacMediaKeyForwarder \
          -configuration Release \
          -archivePath build/MacMediaKeyForwarder.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
          CODE_SIGN_STYLE=Manual

    - name: Build and Archive (Unsigned)
      if: steps.check_secrets.outputs.has_certs != 'true'
      run: |
        echo "Building without code signing (no certificates provided)"
        xcodebuild \
          -project MacMediaKeyForwarder.xcodeproj \
          -scheme MacMediaKeyForwarder \
          -configuration Release \
          -archivePath build/MacMediaKeyForwarder.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Export App
      run: |
        if [ -n "$SIGNING_IDENTITY" ]; then
          cat > build/ExportOptions.plist <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>developer-id</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>signingCertificate</key>
            <string>Developer ID Application</string>
        </dict>
        </plist>
        EOF
        else
          cat > build/ExportOptions.plist <<EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>mac-application</string>
            <key>signingStyle</key>
            <string>manual</string>
        </dict>
        </plist>
        EOF
        fi

        xcodebuild \
          -exportArchive \
          -archivePath build/MacMediaKeyForwarder.xcarchive \
          -exportPath build/Export \
          -exportOptionsPlist build/ExportOptions.plist

    - name: Notarize App
      if: steps.check_secrets.outputs.has_certs == 'true' && steps.check_secrets.outputs.has_notarization == 'true'
      env:
        NOTARIZATION_USERNAME: ${{ secrets.NOTARIZATION_USERNAME }}
        NOTARIZATION_PASSWORD: ${{ secrets.NOTARIZATION_PASSWORD }}
        NOTARIZATION_TEAM_ID: ${{ secrets.NOTARIZATION_TEAM_ID }}
      run: |
        APP_PATH=$(find build -name "MacMediaKeyForwarder.app" -type d | head -1)

        if [ -z "$APP_PATH" ]; then
          echo "Error: Could not find MacMediaKeyForwarder.app for notarization"
          exit 1
        fi

        echo "Notarizing app at: $APP_PATH"
        xcrun notarytool submit "$APP_PATH" \
          --apple-id "$NOTARIZATION_USERNAME" \
          --password "$NOTARIZATION_PASSWORD" \
          --team-id "$NOTARIZATION_TEAM_ID" \
          --wait

        echo "Stapling notarization ticket..."
        xcrun stapler staple "$APP_PATH"

    - name: Create DMG
      id: create_dmg
      run: |
        mkdir -p build

        APP_PATH=$(find build -name "MacMediaKeyForwarder.app" -type d | head -1)

        if [ -z "$APP_PATH" ]; then
          echo "Error: Could not find MacMediaKeyForwarder.app"
          find build -type d
          exit 1
        fi

        echo "Found app at: $APP_PATH"

        mkdir -p build/dmg-staging
        cp -R "$APP_PATH" build/dmg-staging/
        ln -s /Applications build/dmg-staging/Applications

        WORKSPACE_DIR="$(pwd)"
        SOURCE_DIR="${WORKSPACE_DIR}/build/dmg-staging"
        DMG_NAME="MacMediaKeyForwarder.dmg"
        DMG_PATH="${WORKSPACE_DIR}/build/${DMG_NAME}"

        echo "Creating DMG: $DMG_NAME"

        hdiutil create \
          -volname "Mac Media Key Forwarder" \
          -srcfolder "$SOURCE_DIR" \
          -ov \
          -format UDZO \
          "$DMG_PATH" || {
            echo "hdiutil failed, trying create-dmg..."
            brew install create-dmg
            create-dmg \
              --volname "Mac Media Key Forwarder" \
              --window-pos 200 120 \
              --window-size 800 400 \
              --icon-size 100 \
              --app-drop-link 600 185 \
              "$DMG_PATH" \
              "$SOURCE_DIR"
          }

        if [ -n "$SIGNING_IDENTITY" ]; then
          echo "Signing DMG..."
          codesign --force --sign "$SIGNING_IDENTITY" "$DMG_PATH"
        fi

        if [ -f "$DMG_PATH" ]; then
          echo "DMG created successfully!"
          ls -lh "$DMG_PATH"
          echo "dmg_name=$DMG_NAME" >> $GITHUB_OUTPUT
        else
          echo "Error: DMG file not found at $DMG_PATH"
          find . -name "*.dmg" -type f
          exit 1
        fi

    - name: Clean up keychain
      if: always() && steps.check_secrets.outputs.has_certs == 'true'
      run: |
        KEYCHAIN_PATH=$RUNNER_TEMP/build.keychain
        security delete-keychain "$KEYCHAIN_PATH" || true

    - name: Generate Release Notes
      id: release_notes
      run: |
        PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")

        if [ -z "$PREV_TAG" ]; then
          COMMITS=$(git log --pretty=format:"- %s (%h)" --reverse)
        else
          COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --reverse)
        fi

        SIGNED_STATUS="unsigned"
        if [ -n "$SIGNING_IDENTITY" ]; then
          SIGNED_STATUS="signed and notarized"
        fi

        cat > release_notes.md <<EOF
        ## Changes in this release

        $COMMITS

        ## Installation

        1. Download the DMG file below
        2. Open the DMG
        3. Drag MacMediaKeyForwarder.app to your Applications folder
        4. Launch Mac Media Key Forwarder from Applications
        5. Grant Accessibility and Automation permissions in System Settings > Privacy & Security

        ## Build Information

        - Build type: $SIGNED_STATUS
        EOF

        cat release_notes.md

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: build/MacMediaKeyForwarder.dmg
        body_path: release_notes.md
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
